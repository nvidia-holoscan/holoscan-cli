# Manual release workflow: lint, unit tests, wheel + sdist build,
# package metadata + content validation, installed-wheel smoke tests,
# and (for non-GA dispatches only) TestPyPI publish.
#
# For more information see:
# https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.2.34)'
        required: true
        type: string
        default: v
      rc:
        description: 'RC Build Number'
        required: false
        type: number
      ga:
        description: 'GA (Official) Build'
        required: true
        type: boolean
        default: false


jobs:
  pre-commit:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]
    env:
      PYTHON_VERSION: ${{ matrix.python-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: Gr1N/setup-poetry@v9

      - name: Install library and dependencies
        run: |
          poetry run pip install --upgrade pip setuptools
          poetry -vvv install --with test

      - name: Run pre-commit Check
        uses: pre-commit/action@v3.0.1

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python:
          [
            { version: "3.10", coveralls: false },
            { version: "3.11", coveralls: false },
            { version: "3.12", coveralls: true }, # publish coverage with latest version of Python
            { version: "3.13", coveralls: false },
          ]
    env:
      PYTHON_VERSION: ${{ matrix.python.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python.version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python.version }}

      - name: Install Poetry
        uses: Gr1N/setup-poetry@v9

      - name: Install library and dependencies
        run: |
          poetry run pip install --upgrade pip setuptools
          poetry install --with test

      - name: Run Pytest + Coverage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLATFORM: ${{ matrix.os }}
        run: |
          poetry run pytest

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v6
        if: ${{ matrix.python.coveralls }}
        with:
          name: coverage
          path: tests/reports/.coverage.lcov

      - name: Upload Coveralls Report
        uses: coverallsapp/github-action@v2.3.7
        if: ${{ matrix.python.coveralls }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: tests/reports/.coverage.lcov

  build:
    name: build wheel
    runs-on: ubuntu-latest
    needs: [pre-commit, test]
    permissions:
      id-token: write
      contents: write
    steps:

    - name: Create tag
      uses: actions/github-script@v8.0.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        script: |
          github.rest.git.createRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: 'refs/tags/${{ github.event.inputs.version }}',
            sha: context.sha
          })

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install Poetry
      uses: Gr1N/setup-poetry@v9

    - name: Build wheel and sdist
      env:
        rc: ${{ github.event.inputs.rc }}
        ga: ${{ github.event.inputs.ga }}
      run: |
        git tag -l
        poetry run which python
        source $(poetry env info --path)/bin/activate
        poetry install
        poetry dynamic-versioning -vvv
        poetry build -vvv --clean

    - name: Validate package metadata
      run: |
        source $(poetry env info --path)/bin/activate
        python -m pip install --upgrade twine
        python -m twine check dist/*

    - name: Assert wheel package contents
      run: |
        wheel=$(find dist -name 'holoscan_cli-*.whl' | head -n1)
        echo "Inspecting $wheel"
        listing=$(unzip -l "$wheel")
        required=(
          'holoscan_cli/logging\.json$'
          'holoscan_cli/py\.typed$'
          'holoscan_cli/project/metadata/.+\.schema\.json$'
          'holoscan_cli/project/cmake/'
          'holoscan_cli/project/testing/'
        )
        for pattern in "${required[@]}"; do
          if ! echo "$listing" | grep -qE "$pattern"; then
            echo "Missing from wheel: $pattern" >&2
            exit 1
          fi
        done

    - uses: actions/upload-artifact@v6
      name: Upload build
      with:
        name: build-artifact
        path: dist/*

    - name: Remove tag
      uses: actions/github-script@v8.0.0
      if: ${{ inputs.ga == false }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        script: |
          try {
            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'tags/${{ github.event.inputs.version }}'
            });
            console.log('Tag ${{ github.event.inputs.version }} deleted successfully');
          } catch (error) {
            if (error.status === 422) {
              console.log('Tag ${{ github.event.inputs.version }} does not exist, skipping deletion');
            } else {
              throw error;
            }
          }

  smoke-test:
    runs-on: ${{ matrix.os }}
    needs: [build]
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Download build
        uses: actions/download-artifact@v8.0.0
        with:
          name: build-artifact
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Holoscan CLI in clean venv
        run: |
          python -m venv /tmp/holoscan-cli-smoke
          wheel=$(find . -name 'holoscan_cli-*.whl' | head -n1)
          /tmp/holoscan-cli-smoke/bin/pip install "${wheel}"
      - name: Smoke Test
        run: |
          /tmp/holoscan-cli-smoke/bin/holoscan --help
          /tmp/holoscan-cli-smoke/bin/holoscan version
          /tmp/holoscan-cli-smoke/bin/holoscan lint --dryrun
      - name: Negative command surface
        run: |
          if /tmp/holoscan-cli-smoke/bin/holoscan package --help; then exit 1; fi
          if /tmp/holoscan-cli-smoke/bin/holoscan hap-run --help; then exit 1; fi
          if /tmp/holoscan-cli-smoke/bin/holoscan nics; then exit 1; fi
          if [ -x /tmp/holoscan-cli-smoke/bin/holohub ]; then exit 1; fi
          if [ -x /tmp/holoscan-cli-smoke/bin/monai-deploy ]; then exit 1; fi

  testpypi-deploy:
    if: ${{ inputs.ga == false }}
    name: publish-test-pypi
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    needs: [smoke-test]
    steps:
    - name: Download build
      uses: actions/download-artifact@v8.0.0
      with:
        name: build-artifact
        path: dist/
    - name: Publish package distributions to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        verbose: true
