# HoloHub-derived lint baseline for the consolidated Holoscan CLI.
# Run `pre-commit autoupdate` to refresh to latest compatible versions.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: |
          (?x)(
            tests/app/expected-output/.*
          )$
      - id: mixed-line-ending
      - id: name-tests-test
        args: ["--pytest-test-first"]
        exclude: ^tests/app/.*
      - id: requirements-txt-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--ignore, E712, --cache-dir, .cache/ruff]

  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort
        args: [--settings-path, .]

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.3.1
    hooks:
      - id: black

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - --ignore-words=.lint/codespell_ignore_words.txt
          - --exclude-file=.lint/codespell.txt

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--config, .lint/markdownlint.yaml, --ignore-path, .lint/markdownlintignore]

  - repo: local
    hooks:
      - id: cmakelint
        name: cmakelint
        entry: cmakelint
        language: python
        additional_dependencies: ["cmakelint==1.4.3"]
        args:
          - --filter=-whitespace/indent,-linelength,-readability/wonkycase,-convention/filename,-package/stdargs
        files: '(^|/)CMakeLists\.txt$|\.cmake$'
        exclude: |
          (?x)(
            ^build[^/]*/
            | ^install[^/]*/
            | (^|/)\.[^/]+/
          )
